server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommercepayment
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database: postgresql
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: true

  flyway:
    enabled: true
    locations: classpath:db/migration  # Path where migration scripts are located
    baseline-on-migrate: true  # Ensures Flyway starts with a baseline
    baseline-description: "init"
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: paymentNotification:com.damlotec.ecommerce.kafka.PaymentNotification

